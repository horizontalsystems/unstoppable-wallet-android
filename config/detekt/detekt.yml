# Detekt configuration for Android/Compose/Koin project
# Based on default config with project-specific overrides

build:
  maxIssues: 0  # fail on any issue (strict mode)

complexity:
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter: ['Composable']
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15
    ignoreDeprecated: true
    ignorePrivate: true
    ignoreOverridden: true

exceptions:
  TooGenericExceptionCaught:
    active: false  # common pattern in swap/network code
  SwallowedException:
    active: false  # try/catch with Timber logging is our pattern

naming:
  FunctionNaming:
    active: true
    # Allow PascalCase for Composable functions
    functionPattern: '([a-z][a-zA-Z0-9]*)|([A-Z][a-zA-Z0-9]*)'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9_]*'
  MatchingDeclarationName:
    active: false  # multiple top-level declarations per file is common

style:
  ForbiddenComment:
    active: false  # we use TODO comments
  MagicNumber:
    active: false  # too noisy for UI code with dp/sp values
  MaxLineLength:
    active: true
    maxLineLength: 150
    excludeCommentStatements: true
    excludePackageStatements: true
    excludeImportStatements: true
  ReturnCount:
    active: true
    max: 5
    excludeGuardClauses: true
  UnusedImports:
    active: true

custom-rules:
  UnnecessaryFullyQualifiedNameRule:
    active: true
  UnusedPrivateMember:
    active: true
    allowedNames: '(_.*|Preview.*)'
  WildcardImport:
    active: false  # Compose imports often use wildcard
  UnnecessaryAbstractClass:
    active: false  # ViewModelUiState pattern uses abstract classes
  ForbiddenMethodCall:
    active: true
    methods:
      - 'kotlin.io.println'
      - 'kotlin.io.print'

potential-bugs:
  CastToNullableType:
    active: false  # as? is legitimate pattern
  UnsafeCast:
    active: true

# Compose rules (io.nlopez.compose.rules)
Compose:
  # Naming
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  CompositionLocalNaming:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewNaming:
    active: false
  ModifierNaming:
    active: true

  # Parameter ordering
  ComposableParamOrder:
    active: true  # Modifier should be first optional param
  ContentTrailingLambda:
    active: true  # content lambda should be last
  LambdaParameterEventTrailing:
    active: true  # event lambdas after state params

  # Modifier rules
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true  # top-level Composables should accept Modifier
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true  # Modifier param should default to Modifier

  # Stability & performance
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  RememberMissing:
    active: true
  RememberContentMissing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  UnstableCollections:
    active: false  # too noisy, requires @Immutable annotations everywhere

  # Architecture
  ViewModelForwarding:
    active: true  # don't pass ViewModel to child Composables
  ViewModelInjection:
    active: true  # inject VM at top level only
  ContentEmitterReturningValues:
    active: true
  MultipleEmitters:
    active: true
  ContentSlotReused:
    active: true

  # Material
  Material2:
    active: true  # catch Material 2 usage (forbidden per CLAUDE.md)

  # Visibility
  DefaultsVisibility:
    active: true
  PreviewPublic:
    active: true  # preview functions should be private

  # Composition locals
  CompositionLocalAllowlist:
    active: false  # no allowlist configured yet
